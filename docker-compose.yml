version: '3.8'

services:
  # ─── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: psypyrus-postgres
    environment:
      POSTGRES_USER: psypyrus
      POSTGRES_PASSWORD: psypyrus_secret
      POSTGRES_DB: psypyrus_sync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psypyrus -d psypyrus_sync"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - psypyrus-network

  # ─── PsyPyrus Sync Service (Node.js + Express + Prisma) ────
  sync-service:
    build:
      context: ./sync-service
      dockerfile: Dockerfile
    container_name: psypyrus-sync-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://psypyrus:psypyrus_secret@postgres:5432/psypyrus_sync?schema=public
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      # Firebase credentials: mount your service account file or set inline env vars
      # - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/firebase_sa
      # - FIREBASE_PROJECT_ID=your-project-id
      # - FIREBASE_CLIENT_EMAIL=firebase-adminsdk@your-project.iam.gserviceaccount.com
      # - FIREBASE_PRIVATE_KEY="-----BEGIN RSA PRIVATE KEY-----..."
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - psypyrus-network

  # ─── Containerized PsyPyrus React Web Application ───────────
  psypyrus-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: psypyrus-web-service
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - VITE_SYNC_API_URL=http://sync-service:3001
    depends_on:
      - sync-service
    restart: always
    networks:
      - psypyrus-network

  # ─── Prometheus Metrics Scraper ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-metrics-scraper
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - psypyrus-network

  # ─── Grafana Dashboard ──────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-metrics-dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - psypyrus-network

volumes:
  postgres_data:
    driver: local

networks:
  psypyrus-network:
    driver: bridge
